<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80">
  <!-- Dark navy background -->
  <rect width="240" height="80" fill="#002147" rx="8"/>

  <!-- Teal accent bar on left -->
  <rect x="0" y="0" width="5" height="80" fill="#00B4D8" rx="2"/>

  <!-- "tech" — teal, heavy weight -->
  <text x="26" y="50" fill="#00B4D8" font-size="34" font-family="Arial Black, Arial, sans-serif" font-weight="900" letter-spacing="-1">tech</text>

  <!-- "UK" — white, heavy weight, tight to "tech" -->
  <text x="114" y="50" fill="#FFFFFF" font-size="34" font-family="Arial Black, Arial, sans-serif" font-weight="900" letter-spacing="1">UK</text>

  <!-- Thin divider -->
  <line x1="26" y1="56" x2="214" y2="56" stroke="#00B4D8" stroke-width="1" opacity="0.35"/>

  <!-- Tagline spaced-out small caps -->
  <text x="120" y="70" fill="#90CAE0" font-size="7.5" font-family="Arial, sans-serif" font-weight="400" text-anchor="middle" letter-spacing="1.8">UK TECHNOLOGY TRADE ASSOCIATION</text>
</svg>
